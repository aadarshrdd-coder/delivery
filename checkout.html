<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – SWITCHIT</title>
  <meta name="description" content="Complete your order. Enter delivery details and place your vegetable order." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="locations.js"></script>
  <script defer src="assets/js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo">🚀 Switchit</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      <a href="checkout.html" class="active">Checkout</a>
    </nav>
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">☰</button>
  </header>

  <section class="page-banner">
    <h1>Checkout</h1>
  </section>

  <section class="checkout-section">
    <form class="checkout-form" id="checkout-form">
      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" required placeholder="e.g. Aadarsh Kumar" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" required placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label for="state">State <button type="button" id="detect-checkout-btn" class="btn-text" style="padding:0; font-size:0.75rem; display:inline-block; vertical-align:middle; margin-left:5px;">(📍 Detect Location)</button></label>
        <select id="state" required>
          <option value="">Select State</option>
        </select>
      </div>
      <div class="form-group">
        <label for="city">City / Town</label>
        <select id="city" required disabled>
          <option value="">Select City</option>
        </select>
      </div>
      <div class="form-group full-width">
        <label for="address">Delivery Address</label>
        <textarea id="address" rows="3" required placeholder="House no., street, city, pincode"></textarea>
      </div>
      <div class="form-group">
        <label for="payment-method">Payment</label>
        <select id="payment-method">
          <option value="cod">Cash on Delivery</option>
          <option value="upi">UPI</option>
          <option value="card">Credit / Debit Card</option>
        </select>
      </div>

      <div class="order-overview" id="order-overview">
        <!-- JS shows items + total here -->
      </div>

      <button type="submit" class="btn-primary submit-btn" id="place-order-btn">Place Order</button>
    </form>

    <!-- Success modal -->
    <div class="modal-overlay" id="success-modal" style="display:none;">
      <div class="modal-card">
        <span class="modal-icon">🎉</span>
        <h2>Order Placed!</h2>
        <div id="success-order-summary"></div>
        <p>Thank you for choosing Switchit. Your order details have been shared with our team via WhatsApp.</p>
        <a href="index.html" class="btn-primary">Back to Home</a>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <p>&copy; 2026 Switchit. All rights reserved.</p>
  </footer>
</body>
</html>
